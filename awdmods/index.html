<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWDMods · Draft Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0d12;--surface:#16161f;--surface2:#1e1e2a;--border:#2a2a3a;--text:#e2e2e8;--muted:#7a7a90;--accent:#6c63ff;--accent-dim:#3d3880;--green:#3ecf8e;--green-dim:#1a5c40;--yellow:#f0b429;--yellow-dim:#5c4410;--red:#f56565;--red-dim:#5c1a1a}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
    .header{position:sticky;top:0;z-index:100;background:rgba(13,13,18,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 20px}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .header-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.05em;text-transform:uppercase}
    .header-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
    .stats-row{display:flex;gap:16px;align-items:center}
    .stat{text-align:center}
    .stat-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;line-height:1}
    .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
    .stat-val.green{color:var(--green)}.stat-val.yellow{color:var(--yellow)}.stat-val.muted{color:var(--muted)}
    .progress-bar-wrap{height:4px;background:var(--surface2);border-radius:2px;margin-top:10px;overflow:hidden}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .4s ease}
    .toolbar{display:flex;gap:8px;align-items:center;padding:12px 20px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
    .search-wrap{flex:1;min-width:180px;position:relative}
    .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
    .search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 12px 7px 32px;outline:none;font-family:inherit}
    .search-input:focus{border-color:var(--accent)}.search-input::placeholder{color:var(--muted)}
    .filter-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap}
    .filter-btn:hover{color:var(--text)}.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .content{padding:16px 20px 60px}
    .vendor-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:12px 0 6px;margin-top:4px}
    .product-row{display:grid;grid-template-columns:28px 1fr 220px;align-items:center;gap:10px;padding:9px 14px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;background:var(--surface);transition:background .1s}
    .product-row:hover{background:var(--surface2)}.product-row.done{opacity:.4}.product-row.hidden{display:none}
    .status-btn{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .status-btn:hover{border-color:var(--green)}
    .product-row.done .status-btn{border-color:var(--green);background:var(--green-dim)}
    .check-dot{width:8px;height:8px;border-radius:50%;display:none;background:var(--green)}
    .product-row.done .check-dot{display:block}
    .product-title{font-size:12px;color:var(--text);line-height:1.4}
    .product-meta{font-size:10px;color:var(--muted);margin-top:2px}
    .product-meta .vendor{color:var(--accent)}
    .no-type-badge{color:var(--red);font-style:italic}
    .type-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;padding:5px 8px;outline:none;font-family:inherit;cursor:pointer}
    .type-select:focus{border-color:var(--accent)}
    .type-select.unsaved{border-color:var(--yellow)}
    .copy-row-btn{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;margin-top:4px;transition:all .15s;white-space:nowrap}
    .copy-row-btn:hover{border-color:var(--accent);color:var(--accent)}.copy-row-btn.copied{border-color:var(--green);color:var(--green)}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">AWDMods · Draft Products</div>
      <div class="header-subtitle">40 drafts — verify/set product type, mark done</div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val green" id="stat-done">0</div><div class="stat-label">Done</div></div>
      <div class="stat"><div class="stat-val yellow" id="stat-notype">0</div><div class="stat-label">No Type</div></div>
      <div class="stat"><div class="stat-val muted" id="stat-left">40</div><div class="stat-label">Left</div></div>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="main-progress" style="width:0%"></div></div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="search" type="text" placeholder="Search title or vendor…" oninput="applyFilters()">
  </div>
  <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" id="filter-notype" onclick="setFilter('notype')">No Type</button>
  <button class="filter-btn" id="filter-pending" onclick="setFilter('pending')">Pending</button>
  <button class="filter-btn" id="filter-done" onclick="setFilter('done')">Done</button>
</div>

<div class="content" id="content"></div>

<script>
const TYPES=["Accessories","Accessory","Battery Accessories","Blow Off Valve","Brake Pads","Brake Rotor","Camber Arms","Carbon Fiber Cover","Carbon Fiber Trim","Cat-Back Exhaust","Chassis Brace","Clutch Kit","Coilovers","Cold Air Intake","Coolant Hose","Cooling Component","Differential Upgrade","Engine Component","Engine Dress Up","Engine Mount","Exhaust System","Expansion Tank","Exterior Accessory","Exterior Styling","Fender Flares","Floor Mats","Front Splitter","Fuel System","Headlight","Hood","Hood Lift Kit","Intake System","Intercooler","Interior Accessory","License Plate Relocation","Lowering Springs","Mirror Covers","Mud Flaps","Oil Catch Can","Radiator","Radiator Hoses","Rear Diffuser","Roof","Seat Bracket","Shift Knob","Short Throw Shifters","Side Skirts","Spoiler","Sway Bars","Tow Hook","Trunk","Tuning Module","Wastegate","Wheel Spacers","Wing Accessories"];

const PRODUCTS=[
  {id:"7757587415105",title:"Borla Cat-Back S-Type Exhaust System for the Ford Focus ST",vendor:"Borla",type:"Cat-Back Exhaust"},
  {id:"7757595836481",title:"Borla Cat-Back ATAK Exhaust System for the Ford Focus RS",vendor:"Borla",type:"Cat-Back Exhaust"},
  {id:"7757595934785",title:"Borla Cat-Back S-Type Exhaust System for the Ford Focus RS",vendor:"Borla",type:"Cat-Back Exhaust"},
  {id:"7757601570881",title:"Borla Cat-Back S-Type Exhaust System for the Subaru WRX / STI",vendor:"Borla",type:"Cat-Back Exhaust"},
  {id:"7757587906625",title:"Cal Pony Cars Carbon Fiber Side View Mirror Covers for the Ford Focus RS / ST",vendor:"Cal Pony Cars",type:"Mirror Covers"},
  {id:"7757596098625",title:"Cal Pony Cars Carbon Fiber Air Intake Box Cover for the Ford Focus RS",vendor:"Cal Pony Cars",type:"Intake System"},
  {id:"7757596196929",title:"Cal Pony Cars Carbon Fiber Chin Spoiler for the Ford Focus RS",vendor:"Cal Pony Cars",type:"Spoiler"},
  {id:"7757596459073",title:"Cal Pony Cars Rear Canards for the Ford Focus RS",vendor:"Cal Pony Cars",type:""},
  {id:"7774563434561",title:"Cal Pony Cars Carbon Fiber Exhaust Trim for the Ford Focus ST",vendor:"Cal Pony Cars",type:""},
  {id:"7787119607873",title:"ETS Cat-Back Exhaust System for the Ford Focus RS",vendor:"ETS",type:"Cat-Back Exhaust"},
  {id:"7787119706177",title:"ETS Extreme Cat-Back Exhaust System for the Ford Focus RS",vendor:"ETS",type:"Cat-Back Exhaust"},
  {id:"7787119771713",title:"ETS Front Mount Intercooler for the Ford Focus RS",vendor:"ETS",type:"Intercooler"},
  {id:"7787119804481",title:"ETS Intake System for the Ford Focus RS",vendor:"ETS",type:"Intake System"},
  {id:"7787119870017",title:"ETS Intercooler Piping Kit for the Ford Focus RS",vendor:"ETS",type:"Intercooler"},
  {id:"7787120361537",title:"ETS Cat-Back Extreme Exhaust System for the Subaru WRX / STI",vendor:"ETS",type:"Cat-Back Exhaust"},
  {id:"7757588365377",title:"Grimmspeed Lightweight Battery Mount Kit for the Ford Focus RS / ST",vendor:"Grimmspeed",type:"Engine Component"},
  {id:"7757598294081",title:"Grimmspeed License Plate Relocation Kit for the Ford Focus RS",vendor:"Grimmspeed",type:"License Plate Relocation"},
  {id:"7757601964097",title:"Grimmspeed License Plate Relocation Kit for the Subaru WRX / STI",vendor:"Grimmspeed",type:"License Plate Relocation"},
  {id:"7757618446401",title:"Grimmspeed Battery Tie Down for the Subaru WRX STI",vendor:"Grimmspeed",type:"Battery Accessories"},
  {id:"7757618479169",title:"Grimmspeed Radiator Hose Kit for the Subaru WRX STI",vendor:"Grimmspeed",type:"Radiator Hoses"},
  {id:"7757618544705",title:"Grimmspeed Stealthbox Cold Air Intake for the Subaru WRX STI",vendor:"Grimmspeed",type:"Cold Air Intake"},
  {id:"7774564089921",title:"Grimmspeed Boost Control Solenoid 3-Port for the Subaru WRX STI",vendor:"Grimmspeed",type:""},
  {id:"7774565728321",title:"Mishimoto Race Cold Air Intake for the Subaru WRX STI",vendor:"Mishimoto",type:""},
  {id:"7757590233153",title:"Seibon Carbon Fiber Hatchback Trunk Lid for the Ford Focus RS / ST",vendor:"Seibon",type:"Trunk"},
  {id:"7757590331457",title:"Seibon Dry Carbon Fiber Replacement Roof for the Ford Focus RS / ST",vendor:"Seibon",type:"Roof"},
  {id:"7757590429761",title:"Seibon RS-Style Carbon Fiber Hood for the Ford Focus RS / ST",vendor:"Seibon",type:"Hood"},
  {id:"7757600129089",title:"Seibon Carbon Fiber Fog Light Bezels for the Ford Focus RS (Set of 2)",vendor:"Seibon",type:"Exterior Accessory"},
  {id:"7757600161857",title:"Seibon Carbon Fiber Front Bumper Garnish for the Ford Focus RS",vendor:"Seibon",type:"Exterior Accessory"},
  {id:"7757600194625",title:"Seibon Carbon Fiber Rear Spoiler for the Ford Focus RS",vendor:"Seibon",type:"Spoiler"},
  {id:"7757600227393",title:"Seibon SA Style Carbon Fiber Rear Lip for the Ford Focus RS",vendor:"Seibon",type:"Exterior Accessory"},
  {id:"7757600260161",title:"Seibon SA Style Carbon Fiber Side Skirts for the Ford Focus RS",vendor:"Seibon",type:"Side Skirts"},
  {id:"7757602914369",title:"Seibon Carbon Fiber Fog Light Bezels for the Subaru WRX / STI (Set of 2)",vendor:"Seibon",type:"Exterior Accessory"},
  {id:"7757602947137",title:"Seibon CW Style Carbon Fiber Hood for the Subaru WRX / STI",vendor:"Seibon",type:"Hood"},
  {id:"7757602979905",title:"Seibon MB1 Style Carbon Fiber Front Lip for the Subaru WRX / STI",vendor:"Seibon",type:"Exterior Accessory"},
  {id:"7757603012673",title:"Seibon OEM Style Carbon Fiber Hood for the Subaru WRX STI",vendor:"Seibon",type:"Hood"},
  {id:"7757603045441",title:"Seibon OEM Style Carbon Fiber Trunk Lid for the Subaru WRX STI",vendor:"Seibon",type:"Trunk"},
  {id:"7757603078209",title:"Seibon STI Style Carbon Fiber Spoiler for the Subaru WRX / STI",vendor:"Seibon",type:"Spoiler"},
  {id:"7774564614209",title:"Seibon OEM Style Carbon Fiber Fenders for the Subaru WRX / STI (Pair)",vendor:"Seibon",type:""},
  {id:"7807281430593",title:"Seibon Carbon Fiber Fog Light Bezels for the Ford Focus RS (Set of 2)",vendor:"Seibon",type:"Exterior Styling"},
  {id:"7774564876353",title:"Tufskinz AC Vent Accent Kit in Glossy Domed Carbon Fiber for the Ford Focus RS",vendor:"Tufskinz",type:""},
];

let currentFilter='all';
function getState(){try{return JSON.parse(localStorage.getItem('awdmods-drafts')||'{}')}catch{return{}}}
function saveState(s){localStorage.setItem('awdmods-drafts',JSON.stringify(s))}

function render(){
  const state=getState();
  const vendors=[...new Set(PRODUCTS.map(p=>p.vendor))];
  let html='';
  for(const vendor of vendors){
    const prods=PRODUCTS.filter(p=>p.vendor===vendor);
    html+=`<div class="vendor-label" data-vendor="${vendor.toLowerCase()}">${vendor}</div>`;
    for(const p of prods){
      const ps=state[p.id]||{};
      const done=!!ps.done;
      const currentType=ps.type!==undefined?ps.type:p.type;
      const noType=!currentType;
      const typeOpts=TYPES.map(t=>`<option value="${t}"${currentType===t?' selected':''}>${t}</option>`).join('');
      html+=`<div class="product-row${done?' done':''}" id="row-${p.id}" data-vendor="${p.vendor.toLowerCase()}" data-title="${p.title.toLowerCase()}" data-notype="${noType?'1':'0'}">
<button class="status-btn" onclick="toggleDone('${p.id}')" title="Mark done"><div class="check-dot"></div></button>
<div>
  <div class="product-title">${p.title}</div>
  <div class="product-meta">
    <span class="vendor">${p.vendor}</span>
    ${noType?' · <span class="no-type-badge">no type set</span>':''}
  </div>
  <button class="copy-row-btn" onclick="copyTitle(this,'${p.title.replace(/'/g,"\\'")}')">copy title</button>
</div>
<select class="type-select${ps.type!==undefined&&ps.type!==p.type?' unsaved':''}" id="sel-${p.id}" onchange="onTypeChange('${p.id}',this)">
  <option value="">— select type —</option>
  ${typeOpts}
</select>
</div>`;
    }
  }
  document.getElementById('content').innerHTML=html;
  updateStats();
}

function onTypeChange(id,sel){
  sel.classList.add('unsaved');
  const s=getState();
  if(!s[id])s[id]={};
  s[id].type=sel.value;
  saveState(s);
  const row=document.getElementById('row-'+id);
  row.dataset.notype=sel.value?'0':'1';
  const badge=row.querySelector('.no-type-badge');
  if(sel.value&&badge)badge.remove();
  updateStats();
}

function toggleDone(id){
  const s=getState();
  if(!s[id])s[id]={};
  s[id].done=!s[id].done;
  saveState(s);
  document.getElementById('row-'+id).classList.toggle('done',s[id].done);
  updateStats();applyFilters();
}

function copyTitle(btn,title){
  navigator.clipboard.writeText(title).then(()=>{
    btn.textContent='copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='copy title';btn.classList.remove('copied');},1500);
  });
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('filter-'+f).classList.add('active');
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.product-row').forEach(row=>{
    const matchSearch=!q||row.dataset.title.includes(q)||row.dataset.vendor.includes(q);
    const isDone=row.classList.contains('done');
    const noType=row.dataset.notype==='1';
    const matchFilter=
      currentFilter==='all'||
      (currentFilter==='done'&&isDone)||
      (currentFilter==='pending'&&!isDone)||
      (currentFilter==='notype'&&noType&&!isDone);
    row.classList.toggle('hidden',!matchSearch||!matchFilter);
  });
  document.querySelectorAll('.vendor-label').forEach(label=>{
    const vendor=label.dataset.vendor;
    const anyVisible=[...document.querySelectorAll(`.product-row[data-vendor="${vendor}"]`)].some(r=>!r.classList.contains('hidden'));
    label.style.display=anyVisible?'':'none';
  });
}

function updateStats(){
  const state=getState();
  const total=PRODUCTS.length;
  const done=PRODUCTS.filter(p=>(state[p.id]||{}).done).length;
  const noType=PRODUCTS.filter(p=>{
    const t=(state[p.id]||{}).type!==undefined?(state[p.id]).type:p.type;
    return !t&&!(state[p.id]||{}).done;
  }).length;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-notype').textContent=noType;
  document.getElementById('stat-left').textContent=total-done;
  document.getElementById('main-progress').style.width=(done/total*100).toFixed(1)+'%';
}

render();applyFilters();
</script>
</body>
</html>
