    .header{position:sticky;top:0;z-index:100;background:rgba(13,13,18,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 20px}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .header-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.05em;text-transform:uppercase}
    .header-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
    .stats-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
    .stat{text-align:center}
    .stat-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;line-height:1}
    .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
    .stat-val.green{color:var(--green)}.stat-val.yellow{color:var(--yellow)}.stat-val.muted{color:var(--muted)}
    .progress-bar-wrap{height:4px;background:var(--surface2);border-radius:2px;margin-top:10px;overflow:hidden}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .4s ease}
    .tabs{display:flex;gap:4px;padding:10px 20px 0;border-bottom:1px solid var(--border);background:var(--bg)}
    .tab{padding:8px 16px;border-radius:6px 6px 0 0;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;border-bottom:none;color:var(--muted);background:transparent;transition:all .15s;position:relative;bottom:-1px;white-space:nowrap}
    .tab:hover{color:var(--text)}.tab.active{background:var(--surface);border-color:var(--border);color:var(--text);border-bottom-color:var(--surface)}
    .tab .badge{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-family:'Space Mono',monospace;background:var(--surface2);border-radius:10px;padding:1px 6px;margin-left:6px;color:var(--muted)}
    .tab.active .badge{background:var(--accent-dim);color:var(--accent)}
    .toolbar{display:flex;gap:8px;align-items:center;padding:12px 20px;flex-wrap:wrap}
    .search-wrap{flex:1;min-width:200px;position:relative}
    .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
    .search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 12px 7px 32px;outline:none;font-family:inherit}
    .search-input:focus{border-color:var(--accent)}.search-input::placeholder{color:var(--muted)}
    .filter-btn{padding:7px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap}
    .filter-btn:hover{color:var(--text);border-color:var(--accent)}.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .export-btn{padding:7px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .15s;white-space:nowrap}
    .export-btn:hover{border-color:var(--green);color:var(--green)}
    .content{padding:0 20px 40px}
    .tab-panel{display:none}.tab-panel.active{display:block}
    .vendor-group{margin-bottom:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .vendor-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);cursor:pointer;user-select:none;transition:background .15s}
    .vendor-header:hover{background:var(--surface2)}
    .vendor-chevron{color:var(--muted);transition:transform .2s;flex-shrink:0}
    .vendor-group.collapsed .vendor-chevron{transform:rotate(-90deg)}
    .vendor-name{font-weight:600;font-size:13px;flex:1}
    .vendor-progress-text{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
    .vendor-mini-bar{width:60px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
    .vendor-mini-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
    .vendor-bulk-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
    .vendor-bulk-btn:hover{border-color:var(--accent);color:var(--accent)}
    .vendor-body{background:var(--bg)}
    .vendor-group.collapsed .vendor-body{display:none}
    .sku-row{display:grid;grid-template-columns:28px 90px 1fr 90px 28px 28px;align-items:start;gap:8px;padding:8px 14px;border-top:1px solid var(--border);transition:background .1s}
    .sku-row:hover{background:var(--surface)}.sku-row.hidden{display:none}.sku-row.status-matched{opacity:.4}
    .status-btn{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s}
    .status-btn:hover{border-color:var(--accent)}
    .sku-row.status-inprogress .status-btn{border-color:var(--yellow);background:var(--yellow-dim)}
    .sku-row.status-matched .status-btn{border-color:var(--green);background:var(--green-dim)}
    .status-dot{width:8px;height:8px;border-radius:50%;display:none}
    .sku-row.status-inprogress .status-dot{display:block;background:var(--yellow)}
    .sku-row.status-matched .status-dot{display:block;background:var(--green)}
    .copy-sku-btn{display:flex;align-items:center;gap:4px;font-size:10px;font-family:'Space Mono',monospace;padding:3px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;overflow:hidden;max-width:90px;margin-top:1px}
    .copy-sku-btn:hover{border-color:var(--accent);color:var(--text)}.copy-sku-btn.copied{border-color:var(--green);color:var(--green)}
    .sku-info{padding-top:2px;min-width:0}
    .sku-name{font-size:12px;color:var(--text);line-height:1.4}
    .sku-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
    .tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
    .tag-nocost{background:var(--red-dim);color:var(--red)}.tag-inprogress{background:var(--yellow-dim);color:var(--yellow)}.tag-matched{background:var(--green-dim);color:var(--green)}
    .sku-prices{text-align:right;padding-top:2px}
    .sku-price{font-family:'Space Mono',monospace;font-size:11px;color:var(--text)}
    .sku-cost{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}.sku-cost.missing{color:var(--red)}
    .shopify-btn{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;color:var(--muted);text-decoration:none;transition:all .15s;margin-top:2px}
    .shopify-btn:hover{color:var(--green);background:var(--surface2)}
    .note-btn{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;color:var(--muted);cursor:pointer;padding:0;margin-top:2px;transition:all .15s}
    .note-btn:hover{color:var(--accent);background:var(--surface2)}.sku-row.has-note .note-btn{color:var(--yellow)}
    .sku-note-wrap{grid-column:2/-1;margin-top:4px;display:none}
    .sku-row.has-note .sku-note-wrap,.sku-row.note-open .sku-note-wrap{display:block}
    .sku-note{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;font-family:inherit;padding:5px 8px;resize:vertical;min-height:36px;outline:none}

    .no-results{padding:40px;text-align:center;color:var(--muted);font-size:13px}
    ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

let currentTab='t14',currentFilter='all';

function getState(t){try{return JSON.parse(localStorage.getItem('awdmods-'+t)||'{}')}catch{return{}}}
function saveState(t,s){localStorage.setItem('awdmods-'+t,JSON.stringify(s))}
function getIs(t,s){const st=getState(t);return st[s]||{status:'pending',note:''}}
function setStatus(t,s,v){const st=getState(t);if(!st[s])st[s]={status:'pending',note:''};st[s].status=v;saveState(t,st)}
function setNote(t,s,v){const st=getState(t);if(!st[s])st[s]={status:'pending',note:''};st[s].note=v;saveState(t,st)}

function shopUrl(vid){return `https://${STORE}.myshopify.com/admin/variants/${vid}`}

function esc(s){return s.replace(/'/g,"&#39;").replace(/"/g,"&quot;")}

function renderPanel(tab,data){
  const state=getState(tab);
  return data.map(g=>{
    const id=tab+'-'+g.v.replace(/\s+/g,'_');
    const tot=g.i.length;
    const mat=g.i.filter(i=>(state[i.s]||{}).status==='matched').length;
    const pct=tot?Math.round(mat/tot*100):0;
    return `<div class="vendor-group" id="${id}">
<div class="vendor-header" onclick="toggleV('${id}')">
<svg class="vendor-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
<span class="vendor-name">${g.v}</span>
<span class="vendor-progress-text">${mat}/${tot}</span>
<div class="vendor-mini-bar"><div class="vendor-mini-fill" style="width:${pct}%"></div></div>
<button class="vendor-bulk-btn" onclick="bulkCopy(event,'${id}','${tab}')">Copy pending</button>
</div>
<div class="vendor-body">${g.i.map(item=>renderRow(tab,item,state[item.s]||{status:'pending',note:''})).join('')}</div>
</div>`;
  }).join('');
}

function renderRow(tab,item,is){
  const sc=is.status==='matched'?'status-matched':is.status==='inprogress'?'status-inprogress':'';
  const nc=is.status==='matched'?'':is.status==='inprogress'?'':'' ;
  const hasN=!!is.note;
  const nocost=tab==='t14'&&item.c===null;
  const ss=esc(item.s);
  let tags='';
  if(nocost)tags+=`<span class="tag tag-nocost">no cost</span>`;
  if(is.status==='inprogress')tags+=`<span class="tag tag-inprogress">in progress</span>`;
  if(is.status==='matched')tags+=`<span class="tag tag-matched">matched</span>`;
  let prices=`<div class="sku-prices"><div class="sku-price">$${item.p.toFixed(2)}</div>`;
  if(tab==='t14'){
    if(item.c!=null)prices+=`<div class="sku-cost">cost $${item.c.toFixed(2)}</div>`;
    else prices+=`<div class="sku-cost missing">no cost</div>`;
  }
  prices+='</div>';
  const rowId='row-'+tab+'-'+item.s.replace(/[^a-zA-Z0-9]/g,'_');
  const skuDisp=item.s.length>16?item.s.slice(0,14)+'…':item.s;
  return `<div class="sku-row ${sc} ${hasN?'has-note':''}" id="${rowId}" data-sku="${esc(item.s)}" data-tab="${tab}" data-name="${esc(item.n.toLowerCase())}">
<button class="status-btn" onclick="cycleStatus('${tab}','${ss}',this)" title="pending → in progress → matched"><div class="status-dot"></div></button>
<button class="copy-sku-btn" onclick="copySku(this,'${ss}')" title="${esc(item.s)}">
<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>${skuDisp}</button>
<div class="sku-info"><div class="sku-name">${item.n}</div>${tags?`<div class="sku-tags">${tags}</div>`:''}</div>
${prices}
<a class="shopify-btn" href="${shopUrl(item.vid)}" target="_blank" title="Open variant in Shopify admin"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
<button class="note-btn" onclick="toggleNote(this)" title="Toggle note"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
<div class="sku-note-wrap"><textarea class="sku-note" placeholder="Notes (auto-saved)…" onchange="saveNote('${tab}','${ss}',this.value)">${is.note||''}</textarea></div>
</div>`;
}

function cycleStatus(tab,sku,btn){
  const row=btn.closest('.sku-row');
  const cur=row.classList.contains('status-matched')?'matched':row.classList.contains('status-inprogress')?'inprogress':'pending';
  const next=cur==='pending'?'inprogress':cur==='inprogress'?'matched':'pending';
  row.classList.remove('status-matched','status-inprogress');
  if(next!=='pending')row.classList.add('status-'+next);
  const tagsEl=row.querySelector('.sku-tags');
  if(tagsEl){
    tagsEl.querySelectorAll('.tag-inprogress,.tag-matched').forEach(e=>e.remove());
    if(next==='inprogress')tagsEl.insertAdjacentHTML('beforeend','<span class="tag tag-inprogress">in progress</span>');
    if(next==='matched')tagsEl.insertAdjacentHTML('beforeend','<span class="tag tag-matched">matched</span>');
  }
  setStatus(tab,sku,next);
  updateStats(tab);
  applyFilters();
}

function copySku(btn,sku){
  navigator.clipboard.writeText(sku).then(()=>{
    btn.classList.add('copied');
    const orig=btn.innerHTML;
    btn.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 12 4 16"/></svg> copied!';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML=orig},1500);
  });
}

function toggleNote(btn){
  const row=btn.closest('.sku-row');
  row.classList.toggle('note-open');
  if(row.classList.contains('note-open')||row.classList.contains('has-note'))row.querySelector('.sku-note').focus();
}

function saveNote(tab,sku,val){
  setNote(tab,sku,val);
  const row=document.getElementById('row-'+tab+'-'+sku.replace(/[^a-zA-Z0-9]/g,'_'));
  if(row){val.trim()?row.classList.add('has-note'):row.classList.remove('has-note')}
}

function toggleV(id){document.getElementById(id).classList.toggle('collapsed')}

function bulkCopy(e,vid,tab){
  e.stopPropagation();
  const g=document.getElementById(vid);
  const rows=g.querySelectorAll('.sku-row');
  const pending=[];
  rows.forEach(r=>{if(!r.classList.contains('status-matched'))pending.push(r.dataset.sku)});
  if(!pending.length)return;
  navigator.clipboard.writeText(pending.join('\n')).then(()=>{
    const btn=g.querySelector('.vendor-bulk-btn');
    const orig=btn.textContent;
    btn.textContent=`✓ ${pending.length} copied`;
    setTimeout(()=>btn.textContent=orig,2000);
  });
}

function exportPending(){
  const data=currentTab==='t14'?T14:COST;
  const state=getState(currentTab);
  const lines=[];
  for(const g of data){
    const p=g.i.filter(i=>(state[i.s]||{}).status!=='matched');
    if(p.length){lines.push(`\n## ${g.v}`);p.forEach(i=>lines.push(i.s))}
  }
  navigator.clipboard.writeText(lines.join('\n').trim()).then(()=>{
    const btn=document.querySelector('.export-btn');
    btn.textContent='✓ Copied!';
    setTimeout(()=>btn.textContent='↓ Export Pending',2000);
  });
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('filter-'+f).classList.add('active');
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const panel=document.getElementById('panel-'+currentTab);
  panel.querySelectorAll('.sku-row').forEach(row=>{
    const matchesSearch=!q||row.dataset.sku.toLowerCase().includes(q)||row.dataset.name.includes(q);
    const status=row.classList.contains('status-matched')?'matched':row.classList.contains('status-inprogress')?'inprogress':'pending';
    const matchesFilter=currentFilter==='all'||(currentFilter==='pending'&&status==='pending')||currentFilter===status;
    row.classList.toggle('hidden',!matchesSearch||!matchesFilter);
  });
  panel.querySelectorAll('.vendor-group').forEach(g=>{
    g.style.display=g.querySelectorAll('.sku-row:not(.hidden)').length?'':'none';
  });
}

function updateStats(tab){
  const data=tab==='t14'?T14:COST;
  const state=getState(tab);
  let total=0,matched=0,inprog=0;
  for(const g of data)for(const i of g.i){total++;const s=(state[i.s]||{}).status||'pending';if(s==='matched')matched++;else if(s==='inprogress')inprog++;}
  const pending=total-matched-inprog;
  if(tab===currentTab){
    document.getElementById('stat-matched').textContent=matched;
    document.getElementById('stat-inprogress').textContent=inprog;
    document.getElementById('stat-pending').textContent=pending;
    document.getElementById('stat-total').textContent=total;
    document.getElementById('main-progress').style.width=(matched/total*100).toFixed(1)+'%';
  }
  document.getElementById('badge-'+tab).textContent=pending;
  for(const g of data){
    const id=tab+'-'+g.v.replace(/\s+/g,'_');
    const el=document.getElementById(id);if(!el)continue;
    const vtot=g.i.length;const vmat=g.i.filter(i=>(state[i.s]||{}).status==='matched').length;
    const fill=el.querySelector('.vendor-mini-fill');const txt=el.querySelector('.vendor-progress-text');
    if(fill)fill.style.width=(vtot?Math.round(vmat/vtot*100):0)+'%';
    if(txt)txt.textContent=vmat+'/'+vtot;
  }
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  updateStats(tab);applyFilters();
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('panel-t14').innerHTML=renderPanel('t14',T14);
  document.getElementById('panel-cost').innerHTML=renderPanel('cost',COST);
  updateStats('t14');updateStats('cost');applyFilters();
});
</script>
