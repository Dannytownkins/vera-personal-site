<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWDMods · Pricing Issues</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0d12;--surface:#16161f;--surface2:#1e1e2a;--border:#2a2a3a;--text:#e2e2e8;--muted:#7a7a90;--accent:#6c63ff;--accent-dim:#3d3880;--green:#3ecf8e;--green-dim:#1a5c40;--yellow:#f0b429;--yellow-dim:#5c4410;--red:#f56565;--red-dim:#5c1a1a}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
    .header{position:sticky;top:0;z-index:100;background:rgba(13,13,18,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 20px}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .header-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.05em;text-transform:uppercase}
    .header-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
    .stats-row{display:flex;gap:16px;align-items:center}
    .stat{text-align:center}
    .stat-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;line-height:1}
    .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
    .stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.muted{color:var(--muted)}
    .progress-bar-wrap{height:4px;background:var(--surface2);border-radius:2px;margin-top:10px;overflow:hidden}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .4s ease}
    .content{padding:16px 20px 40px}
    .section{margin-bottom:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .section-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);cursor:pointer;user-select:none}
    .section-header:hover{background:var(--surface2)}
    .section-chevron{color:var(--muted);transition:transform .2s;flex-shrink:0}
    .section.collapsed .section-chevron{transform:rotate(-90deg)}
    .section-title{font-weight:600;font-size:13px;flex:1}
    .section-count{font-family:'Space Mono',monospace;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
    .count-red{background:var(--red-dim);color:var(--red)}
    .count-yellow{background:var(--yellow-dim);color:var(--yellow)}
    .count-green{background:var(--green-dim);color:var(--green)}
    .section-body{background:var(--bg)}
    .section.collapsed .section-body{display:none}
    .issue-row{display:grid;grid-template-columns:28px 1fr auto 120px;align-items:start;gap:10px;padding:9px 14px;border-top:1px solid var(--border);transition:background .1s}
    .issue-row:hover{background:var(--surface)}.issue-row.done{opacity:.4}
    .status-btn{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s}
    .status-btn:hover{border-color:var(--green)}
    .issue-row.done .status-btn{border-color:var(--green);background:var(--green-dim)}
    .check-icon{width:8px;height:8px;display:none}
    .issue-row.done .check-icon{display:block;color:var(--green)}
    .issue-info{}
    .issue-title{font-size:12px;color:var(--text);line-height:1.4}
    .issue-sku{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px}
    .issue-detail{font-size:11px;margin-top:4px;padding:4px 8px;background:var(--surface2);border-radius:4px;border-left:3px solid var(--red);color:var(--text)}
    .issue-row.done .issue-detail{border-left-color:var(--green)}
    .issue-actions{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
    .shopify-btn{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);text-decoration:none;transition:all .15s;white-space:nowrap}
    .shopify-btn:hover{border-color:var(--green);color:var(--green)}
    .note-input{width:120px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:10px;font-family:inherit;padding:3px 6px;outline:none}
    .note-input:focus{border-color:var(--accent)}.note-input::placeholder{color:var(--muted)}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">AWDMods · Pricing Issues</div>
      <div class="header-subtitle">Audit: March 3, 2026 — progress saves in your browser</div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val green" id="stat-done">0</div><div class="stat-label">Fixed</div></div>
      <div class="stat"><div class="stat-val red" id="stat-open">11</div><div class="stat-label">Open</div></div>
      <div class="stat"><div class="stat-val muted" id="stat-total">11</div><div class="stat-label">Total</div></div>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="main-progress" style="width:0%"></div></div>
</div>

<div class="content" id="content"></div>

<script>
const STORE='e1520g-k3';
function shopUrl(pid){return `https://${STORE}.myshopify.com/admin/products/${pid}`}

const ISSUES = [
  {
    section: "🚨 Compare-At LOWER Than Price (price looks marked up)",
    severity: "red",
    items: [
      { id:"h&r-rear-sway", pid:"7024887726145", sku:"ford-focus-rs-hr-rear-sway-bar-71747",
        title:"H&R 24mm 2-Way Adjustable Rear Sway Bar — Ford Focus RS",
        detail:"Price $499.00 but compare-at is $359.00 — looks like it's marked UP. Flip or remove compare-at." },
      { id:"magnaflow-catback", pid:"7024886939713", sku:"ford-focus-rs-magnaflow-competition-series-cat-back-exhaust",
        title:"MagnaFlow Competition Series Cat-Back Exhaust — Ford Focus RS",
        detail:"Price $1,682.00 but compare-at is $1,495.23 — same issue, compare-at below price." },
      { id:"eibach-springs", pid:"7024893771841", sku:"7728",
        title:"Eibach Pro-Kit Lowering Springs — Subaru WRX STI",
        detail:"Price $395.00 but compare-at is $356.67." },
      { id:"injen-evo", pid:"7024895049793", sku:"EVO1206",
        title:"Injen Evolution Series Cold Air Intake — Subaru WRX STI",
        detail:"Price $463.00 but compare-at is $418.89." },
      { id:"injen-sp-polished", pid:"7024895049793", sku:"AWD2455",
        title:"Injen SP Series Cold Air Intake (Polished) — Subaru WRX STI",
        detail:"Price $405.48 but compare-at is $342.06." },
      { id:"injen-sp-red", pid:"7024895049793", sku:"AWD2454",
        title:"Injen SP Series Cold Air Intake (Wrinkle Red) — Subaru WRX STI",
        detail:"Price $405.48 but compare-at is $342.06." },
      { id:"injen-sp-black", pid:"7024895049793", sku:"AWD2456",
        title:"Injen SP Series Cold Air Intake (Black) — Subaru WRX STI",
        detail:"Price $405.48 but compare-at is $342.06." },
    ]
  },
  {
    section: "⚠️ Compare-At Equals Price (no discount shown — pointless)",
    severity: "yellow",
    items: [
      { id:"h&r-front-sway", pid:"7024887726145", sku:"ford-focus-rs-hr-front-sway-bar-70747",
        title:"H&R 26mm 2-Way Adjustable Front Sway Bar — Ford Focus RS",
        detail:"Price $499.00 = compare-at $499.00. No discount is shown — should either set a real compare-at or remove it." },
      { id:"injen-downpipe", pid:"7024895049793", sku:"SES1205DP",
        title:"Injen Super SES Downpipe with High Flow Cat — Subaru WRX STI",
        detail:"Price $633.13 = compare-at $633.13. Same — no discount visible, remove compare-at." },
    ]
  },
  {
    section: "⚠️ Compare-At is $0.00 (shows as crossed-out $0)",
    severity: "yellow",
    items: [
      { id:"aem-strut", pid:"7024882745409", sku:"subaru-wrx-sti-aem-front-strut-tower-bar-29-0011WR",
        title:"AEM Front Strut Tower Bar — Subaru WRX/STI",
        detail:"Price $346.99, compare-at is $0.00. Will display a crossed-out $0.00 which looks broken. Remove compare-at." },
    ]
  },
  {
    section: "🔍 Sanity Check",
    severity: "green",
    items: [
      { id:"ets-turbo", pid:"", sku:"ford-focus-rs-turbo-kit-ets",
        title:"Extreme Turbo Systems Turbo Upgrade Kit — Ford Focus RS",
        detail:"Price $6,295.00 — flagged as >$5k. Is this intentional? If yes, mark done." },
    ]
  }
];

function getState(){try{return JSON.parse(localStorage.getItem('awdmods-pricing')||'{}')}catch{return{}}}
function saveState(s){localStorage.setItem('awdmods-pricing',JSON.stringify(s))}

function render(){
  const state=getState();
  const content=document.getElementById('content');
  content.innerHTML=ISSUES.map(section=>{
    const id='sec-'+section.section.slice(0,10).replace(/\W/g,'_');
    const rows=section.items.map(item=>{
      const done=!!(state[item.id]||{}).done;
      const note=(state[item.id]||{}).note||'';
      return `<div class="issue-row ${done?'done':''}" id="row-${item.id}">
<button class="status-btn" onclick="toggle('${item.id}')" title="Mark fixed">
<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 12 4 16"/></svg>
</button>
<div class="issue-info">
<div class="issue-title">${item.title}</div>
<div class="issue-sku">${item.sku}</div>
<div class="issue-detail">${item.detail}</div>
</div>
<div class="issue-actions">
${item.pid?`<a class="shopify-btn" href="${shopUrl(item.pid)}" target="_blank">Open in Shopify ↗</a>`:''}
<input class="note-input" placeholder="Notes…" value="${note}" onchange="saveNote('${item.id}',this.value)">
</div>
</div>`;
    }).join('');
    return `<div class="section" id="${id}">
<div class="section-header" onclick="toggleSec('${id}')">
<svg class="section-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
<span class="section-title">${section.section}</span>
<span class="section-count count-${section.severity}">${section.items.length}</span>
</div>
<div class="section-body">${rows}</div>
</div>`;
  }).join('');
  updateStats();
}

function toggle(id){
  const s=getState();
  if(!s[id])s[id]={};
  s[id].done=!s[id].done;
  saveState(s);
  const row=document.getElementById('row-'+id);
  row.classList.toggle('done',s[id].done);
  updateStats();
}

function saveNote(id,val){
  const s=getState();
  if(!s[id])s[id]={};
  s[id].note=val;
  saveState(s);
}

function toggleSec(id){document.getElementById(id).classList.toggle('collapsed')}

function updateStats(){
  const state=getState();
  const total=ISSUES.reduce((a,s)=>a+s.items.length,0);
  const done=ISSUES.reduce((a,s)=>a+s.items.filter(i=>(state[i.id]||{}).done).length,0);
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-open').textContent=total-done;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('main-progress').style.width=(done/total*100).toFixed(1)+'%';
}

render();
</script>
</body>
</html>
